  #     - "8081:8081"
  #   restart: on-failure

  app:
    build: .
    command: bash start.sh
    restart: unless-stopped
    volumes:
      - ./config.py:/usr/src/app/config.py:ro
      - ./accounts:/usr/src/app/accounts
      - ./downloads:/usr/src/app/downloads
      - ./sabnzbd:/usr/src/app/sabnzbd
      - tunnel-url:/tmp/tunnel
    expose:
      - "8080"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: >-
      sh -c 'cloudflared tunnel --no-autoupdate --url http://localhost:8080 2>&1 | while IFS= read -r line; do
        echo "$$line";
        if echo "$$line" | grep -qo "https://[a-z0-9-]*\.trycloudflare\.com"; then
          url=$$(echo "$$line" | grep -o "https://[a-z0-9-]*\.trycloudflare\.com");
          echo "$$url" > /tmp/tunnel/url;
          echo "[TUNNEL] $$url";
        fi;
      done'
    volumes:
      - tunnel-url:/tmp/tunnel
    network_mode: "service:app"

volumes:
  tunnel-url:

