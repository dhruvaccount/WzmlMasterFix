version: '3.8'

services:
  app:
    build: .
    command: bash start.sh
    restart: unless-stopped
    network_mode: "host"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_API=${TELEGRAM_API}
      - TELEGRAM_HASH=${TELEGRAM_HASH}
      - TELEGRAM_OWNER_ID=${TELEGRAM_OWNER_ID}
      - TELEGRAM_BASE_URL=${TELEGRAM_BASE_URL}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - TELEGRAM_TIMEZONE=${TELEGRAM_TIMEZONE:-Asia/Kolkata}
      - TELEGRAM_DEFAULT_LANG=${TELEGRAM_DEFAULT_LANG:-en}
      - TELEGRAM_HYDRA_IP=${TELEGRAM_HYDRA_IP}
      - TELEGRAM_HYDRA_API_KEY=${TELEGRAM_HYDRA_API_KEY}
      - TELEGRAM_USER_SESSION_STRING=${TELEGRAM_USER_SESSION_STRING}
      - TELEGRAM_HELPER_TOKENS=${TELEGRAM_HELPER_TOKENS}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY}
      - TELEGRAM_CMD_SUFFIX=${TELEGRAM_CMD_SUFFIX}
      - DB_DATABASE_URL=${DB_DATABASE_URL}
      - DB_MONGO_DB_NAME=${DB_MONGO_DB_NAME:-wzmlx}
      - DB_DATABASE_CLIENT=${DB_DATABASE_CLIENT:-mongodb}
      - LIMIT_MAX_WORKERS=${LIMIT_MAX_WORKERS:-4}
      - LIMIT_API_HOST=${LIMIT_API_HOST:-0.0.0.0}
      - LIMIT_API_PORT=${LIMIT_API_PORT:-8080}
      - LIMIT_DIRECT=${LIMIT_DIRECT:-0}
      - LIMIT_MEGA=${LIMIT_MEGA:-0}
      - LIMIT_TORRENT=${LIMIT_TORRENT:-0}
      - LIMIT_GD_DL=${LIMIT_GD_DL:-0}
      - LIMIT_RC_DL=${LIMIT_RC_DL:-0}
      - LIMIT_CLONE=${LIMIT_CLONE:-0}
      - LIMIT_JD=${LIMIT_JD:-0}
      - LIMIT_NZB=${LIMIT_NZB:-0}
      - LIMIT_YTDLP=${LIMIT_YTDLP:-0}
      - LIMIT_PLAYLIST=${LIMIT_PLAYLIST:-0}
      - LIMIT_LEECH=${LIMIT_LEECH:-0}
      - LIMIT_EXTRACT=${LIMIT_EXTRACT:-0}
      - LIMIT_ARCHIVE=${LIMIT_ARCHIVE:-0}
      - LIMIT_STORAGE=${LIMIT_STORAGE:-0}
      - LIMIT_BOT_MAX_TASKS=${LIMIT_BOT_MAX_TASKS:-0}
      - LIMIT_USER_MAX_TASKS=${LIMIT_USER_MAX_TASKS:-0}
      - LIMIT_STATUS_LIMIT=${LIMIT_STATUS_LIMIT:-10}
      - LIMIT_STATUS_UPDATE_INTERVAL=${LIMIT_STATUS_UPDATE_INTERVAL:-15}
      - LIMIT_QUEUE_ALL=${LIMIT_QUEUE_ALL:-0}
      - LIMIT_QUEUE_DOWNLOAD=${LIMIT_QUEUE_DOWNLOAD:-0}
      - LIMIT_QUEUE_UPLOAD=${LIMIT_QUEUE_UPLOAD:-0}
      - LIMIT_TORRENT_TIMEOUT=${LIMIT_TORRENT_TIMEOUT:-0}
      - LIMIT_BASE_URL_PORT=${LIMIT_BASE_URL_PORT:-0}
      - LIMIT_WEB_PINCODE=${LIMIT_WEB_PINCODE:-true}
      - BOT_BOT_PM=${BOT_BOT_PM:-false}
      - BOT_SET_COMMANDS=${BOT_SET_COMMANDS:-true}
      - BOT_INCOMPLETE_TASK_NOTIFIER=${BOT_INCOMPLETE_TASK_NOTIFIER:-false}
      - GDRIVE_GDRIVE_ID=${GDRIVE_GDRIVE_ID}
      - GDRIVE_GD_DESP=${GDRIVE_GD_DESP:-Uploaded with WZ Bot}
      - GDRIVE_IS_TEAM_DRIVE=${GDRIVE_IS_TEAM_DRIVE:-false}
      - GDRIVE_STOP_DUPLICATE=${GDRIVE_STOP_DUPLICATE:-false}
      - GDRIVE_INDEX_URL=${GDRIVE_INDEX_URL}
      - GDRIVE_USE_SERVICE_ACCOUNTS=${GDRIVE_USE_SERVICE_ACCOUNTS:-false}
      - RCLONE_RCLONE_PATH=${RCLONE_RCLONE_PATH}
      - RCLONE_RCLONE_FLAGS=${RCLONE_RCLONE_FLAGS}
      - RCLONE_RCLONE_SERVE_URL=${RCLONE_RCLONE_SERVE_URL}
      - RCLONE_SHOW_CLOUD_LINK=${RCLONE_SHOW_CLOUD_LINK:-true}
      - RCLONE_RCLONE_SERVE_PORT=${RCLONE_RCLONE_SERVE_PORT:-0}
      - RCLONE_RCLONE_SERVE_USER=${RCLONE_RCLONE_SERVE_USER}
      - RCLONE_RCLONE_SERVE_PASS=${RCLONE_RCLONE_SERVE_PASS}
      - MEGA_MEGA_EMAIL=${MEGA_MEGA_EMAIL}
      - MEGA_MEGA_PASSWORD=${MEGA_MEGA_PASSWORD}
      - JD_JD_EMAIL=${JD_JD_EMAIL}
      - JD_JD_PASS=${JD_JD_PASS}
      - LEECH_LEECH_SPLIT_SIZE=${LEECH_LEECH_SPLIT_SIZE:-0}
      - LEECH_AS_DOCUMENT=${LEECH_AS_DOCUMENT:-false}
      - LEECH_EQUAL_SPLITS=${LEECH_EQUAL_SPLITS:-false}
      - LEECH_MEDIA_GROUP=${LEECH_MEDIA_GROUP:-false}
      - LEECH_USER_TRANSMISSION=${LEECH_USER_TRANSMISSION:-true}
      - LEECH_HYBRID_LEECH=${LEECH_HYBRID_LEECH:-true}
      - LEECH_LEECH_PREFIX=${LEECH_LEECH_PREFIX}
      - LEECH_LEECH_SUFFIX=${LEECH_LEECH_SUFFIX}
      - LEECH_DELETE_LINKS=${LEECH_DELETE_LINKS:-false}
      - LOG_LEECH_DUMP_CHAT=${LOG_LEECH_DUMP_CHAT:-0}
      - LOG_LINKS_LOG_ID=${LOG_LINKS_LOG_ID:-0}
      - LOG_MIRROR_LOG_ID=${LOG_MIRROR_LOG_ID:-0}
      - LOG_CLEAN_LOG_MSG=${LOG_CLEAN_LOG_MSG:-false}
      - RSS_RSS_DELAY=${RSS_RSS_DELAY:-600}
      - RSS_RSS_CHAT=${RSS_RSS_CHAT:-0}
      - RSS_RSS_SIZE_LIMIT=${RSS_RSS_SIZE_LIMIT:-0}
      - SEARCH_SEARCH_API_LINK=${SEARCH_SEARCH_API_LINK}
      - SEARCH_SEARCH_LIMIT=${SEARCH_SEARCH_LIMIT:-0}
      - SEARCH_FILELION_API=${SEARCH_FILELION_API}
      - SEARCH_STREAMWISH_API=${SEARCH_STREAMWISH_API}
      - SEARCH_INSTADL_API=${SEARCH_INSTADL_API}
      - DISABLE_TORRENTS=${DISABLE_TORRENTS:-false}
      - DISABLE_LEECH=${DISABLE_LEECH:-false}
      - DISABLE_BULK=${DISABLE_BULK:-false}
      - DISABLE_MULTI=${DISABLE_MULTI:-false}
      - DISABLE_SEED=${DISABLE_SEED:-false}
      - DISABLE_FF_MODE=${DISABLE_FF_MODE:-false}
      - TELEGRAPH_AUTHOR_NAME=${TELEGRAPH_AUTHOR_NAME:-WZML-X}
      - TELEGRAPH_AUTHOR_URL=${TELEGRAPH_AUTHOR_URL:-https://t.me/WZML_X}
      - YT_YT_DESP=${YT_YT_DESP:-Uploaded to YouTube by WZML-X bot}
      - YT_YT_TAGS=${YT_YT_TAGS:-telegram,bot,youtube}
      - YT_YT_CATEGORY_ID=${YT_YT_CATEGORY_ID:-22}
      - YT_YT_PRIVACY_STATUS=${YT_YT_PRIVACY_STATUS:-unlisted}
      - UPDATE_UPSTREAM_REPO=${UPDATE_UPSTREAM_REPO}
      - UPDATE_UPSTREAM_BRANCH=${UPDATE_UPSTREAM_BRANCH:-master}
      - UPDATE_UPDATE_PKGS=${UPDATE_UPDATE_PKGS:-true}
    volumes:
      - ./downloads:/usr/src/app/downloads
      - ./tokens:/usr/src/app/tokens
      - ./accounts:/usr/src/app/accounts
      - ./rclone:/usr/src/app/rclone
      - ./thumbnails:/usr/src/app/thumbnails