name: Sync WZ-Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - wzv3
    paths:
      - 'update.py'
      - 'start.sh'
      - 'Dockerfile'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WZML-X
        uses: actions/checkout@v6

      - name: Clone WZ-Deploy
        run: |
          git clone https://${{ secrets.WZDEDPLOY_TOKEN }}@github.com/SilentDemonSD/WZ-Deploy.git repo2

      - name: Sync Files
        run: |
          if [ -f update.py ]; then
            cp update.py repo2/update.py
          else
            rm -f repo2/update.py
          fi

          if [ -f start.sh ]; then
            cp start.sh repo2/start.sh
          else
            rm -f repo2/start.sh
          fi

          if [ -f Dockerfile ]; then
            cp Dockerfile repo2/Dockerfile
          else
            rm -f repo2/Dockerfile
          fi

      - name: Commit and Push
        run: |
          cd repo2

          git config user.name "SilentDemonSD"
          git config user.email "105407900+SilentDemonSD@users.noreply.github.com"

          git add update.py start.sh Dockerfile

          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "ci: auto sync from WZML-X (${GITHUB_SHA::7})"

          git push
